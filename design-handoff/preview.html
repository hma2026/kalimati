<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>كلمتي — معاينة الواجهات</title>
<style>
:root{--l2:#7B3FF2;--l3:#2F9B5F;--l4:#E84C68;--l5:#2F78EA;--l6:#D99A1E;--bg:#F5F2FF;--ink:#16162F;--muted:#6C6780;--line:#e7e2f5}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:1180px;margin:auto;padding:24px}
.note{background:#fff7e6;border:1px solid #f3d9a0;border-radius:12px;padding:10px 14px;font-size:13px;margin-bottom:18px}
.screen{background:#fff;border-radius:28px;padding:20px;margin-bottom:26px;box-shadow:0 12px 28px rgba(35,25,80,.10);overflow:hidden}
.hdr{height:92px;border-radius:24px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;color:#fff;margin-bottom:18px}
.hdr h2{margin:0;font-size:22px;font-weight:900}.stars{background:rgba(255,255,255,.25);border-radius:16px;padding:8px 16px;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{grid-template-columns:repeat(4,1fr)}
.pcard{background:#fff;border:3px solid var(--line);border-radius:24px;padding:16px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-family:inherit}
.well{width:90px;height:90px;border-radius:20px;background:linear-gradient(180deg,#fff,#eef2f7);box-shadow:inset 0 0 0 1px rgba(15,23,42,.05);display:grid;place-items:center;overflow:hidden}
.well svg{width:100%;height:100%;object-fit:contain}
.lab{font-weight:800;font-size:20px}
.prow{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.pb{flex:1;min-width:120px;min-height:56px;border:none;border-radius:16px;color:#fff;font-weight:800;font-size:17px;cursor:pointer;font-family:inherit}
.listen{background:var(--l2)}.rec{background:#ef4444}.play{background:#3b82f6}.ok{background:#22c55e}.redo{background:#f97316}
.sub{color:var(--muted);font-weight:700;margin:18px 0 8px;font-size:14px}
@media(max-width:560px){.grid,.grid4{grid-template-columns:repeat(2,1fr)}.well{width:66px;height:66px}.pcard{min-height:130px}}
</style></head><body><div class="wrap">
<div class="note">معاينة ثابتة للشكل والأبعاد والآبار باستخدام الأصول الفعلية (SVG). النصوص هنا أمثلة فقط — في التطبيق تأتي من نظام اللهجات حسب ملف الطفل. ليست لقطة للتطبيق الحيّ.</div>

<div class="screen"><div class="hdr" style="background:linear-gradient(135deg,#7B3FF2,#9a5cf5)"><h2>المستوى الثاني — جملتان</h2><span class="stars">⭐ 12</span></div>

<div class="screen"><div class="hdr" style="background:linear-gradient(135deg,#E84C68,#f06c84)"><h2>المستوى الرابع — مشاعر</h2><span class="stars">⭐ 8</span></div>
<div class="grid"><button class="pcard"><span class="well"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none"><g stroke="#37306B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"><circle cx="128" cy="128" r="96" fill="#FFD23F"/><path d="M86 118 Q98 104 110 118" fill="none"/><path d="M146 118 Q158 104 170 118" fill="none"/><path d="M96 150 Q128 184 160 150" fill="none"/></g></svg></span><span class="lab">أنا سعيد</span></button><button class="pcard"><span class="well"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none"><g stroke="#37306B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"><circle cx="128" cy="128" r="96" fill="#9FC8F0"/><circle cx="98" cy="116" r="9" fill="#37306B" stroke="none"/><circle cx="158" cy="116" r="9" fill="#37306B" stroke="none"/><path d="M96 176 Q128 146 160 176" fill="none"/><path d="M158 132 q6 18 0 30" stroke="#3B82F6" fill="none" stroke-width="6"/></g></svg></span><span class="lab">أنا زعلان</span></button><button class="pcard"><span class="well"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none"><g stroke="#37306B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"><circle cx="128" cy="128" r="96" fill="#FBE7C6"/><circle cx="98" cy="114" r="16" fill="#fff"/><circle cx="98" cy="116" r="7" fill="#37306B" stroke="none"/><circle cx="158" cy="114" r="16" fill="#fff"/><circle cx="158" cy="116" r="7" fill="#37306B" stroke="none"/><ellipse cx="128" cy="166" rx="20" ry="24" fill="#37306B" stroke="none"/><path d="M196 96 q14 22 0 40" stroke="#3B82F6" fill="#bfe0ff" stroke-width="5"/></g></svg></span><span class="lab">أنا خايف</span></button><button class="pcard"><span class="well"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none"><g stroke="#37306B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"><circle cx="128" cy="128" r="96" fill="#FF7A7A"/><path d="M86 108 L112 120" fill="none"/><path d="M170 <div class="screen"><div class="hdr" style="background:linear-gradient(135deg,#2F78EA,#5a96f0)"><h2>المستوى الخامس — ألوان وأشكال</h2><span class="stars">⭐ 5</span></div>

<div class="screen"><div class="hdr" style="background:linear-gradient(135deg,#7B3FF2,#9a5cf5)"><h2>حيوانات وأصوات</h2><span class="stars">⭐ 9</span></div>
